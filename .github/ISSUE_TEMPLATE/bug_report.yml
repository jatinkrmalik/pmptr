name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - macOS
        - Windows
        - Linux (X11)
        - Linux (Wayland)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pmptr version
      description: What version of pmptr are you using? (check the release tag or run `git rev-parse HEAD`)
      placeholder: "e.g. 0.1.0-beta.1"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open the app
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: If applicable, paste any relevant console or terminal output
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: If applicable, add screenshots or screen recordings to help explain the problem
