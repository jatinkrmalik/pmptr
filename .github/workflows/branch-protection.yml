name: Branch Protection Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  pull-requests: write

jobs:
  check-direct-push:
    name: Check for Direct Pushes to Main
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      is_pr_merge: ${{ steps.check.outputs.is_pr_merge }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if push is from a PR merge
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          # Get the commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "Commit message:"
          echo "$COMMIT_MSG"
          echo "---"

          # Prefer the GitHub association because squash/rebase merges do not
          # necessarily leave a "Merge pull request" commit message.
          ASSOCIATED_PRS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/commits/${SHA}/pulls" \
            --jq 'length' 2>/dev/null || echo "0")

          echo "Associated PR count: $ASSOCIATED_PRS"

          if [ "$ASSOCIATED_PRS" -gt 0 ]; then
            echo "✓ This commit is associated with a pull request"
            echo "is_pr_merge=true" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^merge branch"; then
            echo "✓ This is a branch merge"
            echo "is_pr_merge=true" >> $GITHUB_OUTPUT
          else
            echo "✗ WARNING: Direct push detected to main branch!"
            echo "is_pr_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if direct push detected
        if: steps.check.outputs.is_pr_merge == 'false'
        run: |
          echo "::error::Direct push to main branch detected!"
          echo "::error::This branch should only receive changes via pull requests."
          echo "::error::If this was intentional (emergency fix), you can bypass this check."
          echo "::error::Otherwise, please revert this commit and use a PR instead."
          exit 1

  notify-bypass:
    name: Notify on Bypass
    runs-on: ubuntu-latest
    if: always() && needs.check-direct-push.outputs.is_pr_merge == 'false'
    needs: check-direct-push
    continue-on-error: true
    permissions:
      issues: write

    steps:
      - name: Create issue for direct push
        uses: actions/github-script@v7
        with:
          script: |
            const commitSha = context.payload.head_commit.id;
            const commitMsg = context.payload.head_commit.message;
            const author = context.payload.head_commit.author.name;
            const pusher = context.payload.pusher.name;

            const title = `⚠️ Direct push to main by ${pusher}`;
            const body = `A direct push was detected on the main branch.

            **Details:**
            - **Commit**: \`${commitSha}\`
            - **Author**: ${author}
            - **Pusher**: ${pusher}
            - **Message**: ${commitMsg.split('\n')[0]}
            - **Branch**: ${context.ref}

            **Action Required:**
            - If this was intentional, no action needed.
            - If this was accidental, please revert the commit.

            [View commit](${context.payload.head_commit.url})
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['direct-push', 'branch-protection']
            });
