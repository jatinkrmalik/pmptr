name: Nightly Build

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: pmptr-nightly-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 1

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: pmptr-nightly-mac
          path: |
            dist/*.dmg
          retention-days: 1

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: pmptr-nightly-windows
          path: |
            dist/*.exe
          retention-days: 1

  nightly-release:
    name: Create Nightly Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get build information
        id: info
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHA_SHORT="${COMMIT_SHA:0:7}"
          BRANCH="${{ github.ref_name }}"
          BUILD_NUMBER="${{ github.run_number }}"

          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA_SHORT=$COMMIT_SHA_SHORT" >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Generate nightly release notes
        id: release_notes
        run: |
          DATE="${{ steps.info.outputs.DATE }}"
          COMMIT_SHA="${{ steps.info.outputs.COMMIT_SHA }}"
          COMMIT_SHA_SHORT="${{ steps.info.outputs.COMMIT_SHA_SHORT }}"
          BRANCH="${{ steps.info.outputs.BRANCH }}"
          BUILD_NUMBER="${{ steps.info.outputs.BUILD_NUMBER }}"

          # Read template and substitute variables
          TEMPLATE=$(cat .github/NIGHTLY_TEMPLATE.md)
          TEMPLATE="${TEMPLATE//\{\{ date \}\}/$DATE}"
          TEMPLATE="${TEMPLATE//\{\{ commit_sha \}\}/$COMMIT_SHA}"
          TEMPLATE="${TEMPLATE//\{\{ branch \}\}/$BRANCH}"
          TEMPLATE="${TEMPLATE//\{\{ build_number \}\}/$BUILD_NUMBER}"

          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$TEMPLATE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.info.outputs.DATE }}
          name: Nightly Build - ${{ steps.info.outputs.DATE }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: artifacts/**/*
          draft: false
          prerelease: true

  cleanup:
    name: Cleanup Old Nightly Builds
    needs: nightly-release
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Delete old nightly workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_COUNT: 3
        run: |
          echo "Fetching recent nightly workflow runs..."

          # Get all workflow runs for the nightly workflow
          RUNS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/runs?per_page=100" \
            --jq '.workflow_runs[] | select(.name == "Nightly Build") | {id: .id, created_at: .created_at}' \
            2>&1)

          if [ -z "$RUNS" ]; then
            echo "No nightly runs found or unable to fetch."
            exit 0
          fi

          echo "$RUNS" | head -10
          echo "---"

          # Get the IDs of runs to keep (most recent KEEP_COUNT)
          KEEP_IDS=$(echo "$RUNS" | jq -r '.id' | head -n "$KEEP_COUNT")
          echo "Keeping runs: $KEEP_IDS"

          # Get the IDs of runs to delete
          DELETE_IDS=$(echo "$RUNS" | jq -r '.id' | tail -n +$((KEEP_COUNT + 1)))
          echo "Deleting runs: $DELETE_IDS"

          if [ -z "$DELETE_IDS" ]; then
            echo "No old runs to delete."
            exit 0
          fi

          # Delete old runs and their artifacts
          for RUN_ID in $DELETE_IDS; do
            echo "Deleting run $RUN_ID and its artifacts..."

            # Get artifacts for this run
            ARTIFACT_IDS=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
              --jq '.artifacts[].id' 2>/dev/null)

            # Delete each artifact
            for ARTIFACT_ID in $ARTIFACT_IDS; do
              echo "  Deleting artifact $ARTIFACT_ID"
              gh api \
                -X DELETE \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}" \
                > /dev/null 2>&1 || echo "    Failed to delete artifact"
            done

            # Delete the workflow run
            echo "  Deleting run $RUN_ID"
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/actions/runs/${RUN_ID}" \
              > /dev/null 2>&1 || echo "    Failed to delete run"
          done

          echo "Cleanup complete."
