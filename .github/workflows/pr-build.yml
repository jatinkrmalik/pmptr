name: PR Build

# Triggered by commenting "/build <platform>" on a pull request.
# Supported platforms: linux, mac, windows, all.
# Builds the requested PR artifact, uploads it briefly, and posts a link.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare PR Build
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/build')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      head_repo: ${{ steps.pr.outputs.head_repo }}
      ref: ${{ steps.pr.outputs.ref }}
      sha: ${{ steps.pr.outputs.sha }}
      short_sha: ${{ steps.pr.outputs.short_sha }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      pr_title: ${{ steps.pr.outputs.pr_title }}
      matrix: ${{ steps.command.outputs.matrix }}
      platform_label: ${{ steps.command.outputs.platform_label }}

    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR branch info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('head_repo', pr.data.head.repo.full_name);
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('short_sha', pr.data.head.sha.substring(0, 7));
            core.setOutput('pr_number', context.issue.number);
            core.setOutput('pr_title', pr.data.title);

      - name: Parse build command
        id: command
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim().toLowerCase();
            const command = body.split(/\r?\n/).find((line) => line.trim().startsWith('/build'));
            const match = command?.trim().match(/^\/build(?:\s+(\S+))?$/);
            const platform = match?.[1];
            const shortSha = '${{ steps.pr.outputs.short_sha }}';

            const platforms = {
              linux: {
                os: 'ubuntu-latest',
                platform: 'linux',
                artifact_name: `pmptr-pr-${context.issue.number}-linux-${shortSha}`,
                artifact_paths: 'dist/*.AppImage\ndist/*.deb'
              },
              mac: {
                os: 'macos-latest',
                platform: 'mac',
                artifact_name: `pmptr-pr-${context.issue.number}-mac-${shortSha}`,
                artifact_paths: 'dist/*.dmg'
              },
              windows: {
                os: 'windows-latest',
                platform: 'windows',
                artifact_name: `pmptr-pr-${context.issue.number}-windows-${shortSha}`,
                artifact_paths: 'dist/*.exe'
              }
            };

            const aliases = {
              linux: 'linux',
              ubuntu: 'linux',
              mac: 'mac',
              macos: 'mac',
              darwin: 'mac',
              win: 'windows',
              windows: 'windows',
              all: 'all'
            };

            const selected = aliases[platform || ''];
            if (!selected) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '⚠️ **Build command needs a platform.**',
                  '',
                  'Use one of:',
                  '',
                  '- `/build linux`',
                  '- `/build mac`',
                  '- `/build windows`',
                  '- `/build all`'
                ].join('\n')
              });
              core.setFailed('Missing or unsupported build platform.');
              return;
            }

            const include = selected === 'all'
              ? [platforms.linux, platforms.mac, platforms.windows]
              : [platforms[selected]];

            core.setOutput('matrix', JSON.stringify({ include }));
            core.setOutput('platform_label', selected);

      - name: Post build started comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⏳ **PR build started** for \`${{ steps.pr.outputs.short_sha }}\`.\n\nBuilding \`${{ steps.command.outputs.platform_label }}\`. [Watch the build →](${runUrl})`
            });

  build:
    name: Build PR (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.head_repo }}
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          retention-days: 1

  comment:
    name: Comment with Build Links
    needs:
      - prepare
      - build
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
    steps:
      - name: Post build result comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const buildResult = '${{ needs.build.result }}';

            if (buildResult !== 'success') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **PR build failed** for \`${{ needs.prepare.outputs.short_sha }}\`.\n\n[View build logs →](${runUrl})\n\n> Comment \`/build linux\`, \`/build mac\`, \`/build windows\`, or \`/build all\` to retry after fixing the issue.`
              });
              core.setFailed('One or more platform builds failed.');
              return;
            }

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100
            });

            const prefix = 'pmptr-pr-${{ needs.prepare.outputs.pr_number }}-';
            const rows = artifacts
              .filter((artifact) => artifact.name.startsWith(prefix))
              .sort((a, b) => a.name.localeCompare(b.name))
              .map((artifact) => {
                const sizeMb = (artifact.size_in_bytes / 1024 / 1024).toFixed(1);
                const artifactUrl = `${runUrl}/artifacts/${artifact.id}`;
                return `| \`${artifact.name}\` | [Download](${artifactUrl}) | ${sizeMb} MB |`;
              });

            const artifactTable = rows.length
              ? ['| Artifact | Link | Size |', '|---|---|---:|', ...rows].join('\n')
              : '_No artifacts were found for this run._';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `✅ **PR build ready** for \`${{ needs.prepare.outputs.short_sha }}\`.`,
                '',
                artifactTable,
                '',
                'Artifacts are retained for 1 day to keep Actions storage usage low.',
                '',
                `> Comment \`/build linux\`, \`/build mac\`, \`/build windows\`, or \`/build all\` to rebuild.`
              ].join('\n')
            });
